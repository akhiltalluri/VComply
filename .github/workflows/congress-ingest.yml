name: Congress Ingest

on:
  schedule:
    - cron: "15 9 * * *" # Daily at 09:15 UTC
  workflow_dispatch:
    inputs:
      congress:
        description: "Congress number to ingest"
        required: false
        default: "118"
      pages:
        description: "How many API pages to fetch"
        required: false
        default: "3"
      limit:
        description: "Records per page"
        required: false
        default: "50"
      min_score:
        description: "Minimum AI keyword score"
        required: false
        default: "1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Congress ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          CONGRESS_NUM: ${{ github.event.inputs.congress || '118' }}
          PAGES: ${{ github.event.inputs.pages || '3' }}
          LIMIT: ${{ github.event.inputs.limit || '50' }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '1' }}
        run: |
          python scripts/congress_ingest.py \
            --congress "${CONGRESS_NUM}" \
            --pages "${PAGES}" \
            --limit "${LIMIT}" \
            --min-score "${MIN_SCORE}"

